                if(control) map.removeControl(control);
                control = L.Routing.control({
                    waypoints: [L.latLng(origemCoords[0], origemCoords[1]), L.latLng(destinoCoords[0], destinoCoords[1])],
                    routeWhileDragging: false,
                    createMarker: function() { return null; },
                    show: false
                }).addTo(map);
                control.on('routesfound', e => {
                    rotaCoords = e.routes[0].coordinates;
                    var distancia = (e.routes[0].summary.totalDistance / 1000).toFixed(2);
                    var tempoTotal = e.routes[0].summary.totalTime;
                    var horas = Math.floor(tempoTotal / 3600);
                    var minutos = Math.floor((tempoTotal % 3600) / 60);
                    var distanciaFormatada = distancia.replace('.', ',');
                    var distanciaFinal = parseFloat(distanciaFormatada).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    infoDiv.style.display = 'block';
                    infoDiv.innerHTML = `<b>Informações da Rota</b><br>Distância: ${distanciaFinal} KM<br>Tempo: ${horas} h ${minutos.toString().padStart(2,'0')} min`;
                    filtrarPostosProximos();
                });
                map.setView(origemCoords, 6);
            }
        }

        function limparRota() {
            if(control) map.removeControl(control);
            rotaCoords = [];
            infoDiv.style.display = 'none';
            infoDiv.innerHTML = '';
            map.eachLayer(layer => { if(layer instanceof L.Marker) map.removeLayer(layer); });
        }

        function atualizarCidades() {
            var uf = document.getElementById('uf').value;
            var cidadeSelect = document.getElementById('cidade');
            cidadeSelect.innerHTML = '<option value="">Selecione Cidade</option>';
            if(uf) {
                var cidades = [...new Set(postos.filter(p => p.UF === uf).map(p => p.Cidade))];
                cidades.forEach(c => {
                    var opt = document.createElement('option');
                    opt.value = c;
                    opt.textContent = c;
                    cidadeSelect.appendChild(opt);
                });
            }
        }

        function filtrarPostos() {
            var uf = document.getElementById('uf').value;
            var cidade = document.getElementById('cidade').value;
            map.eachLayer(layer => { if(layer instanceof L.Marker) map.removeLayer(layer); });
            postos.filter(p => (!uf || p.UF === uf) && (!cidade || p.Cidade === cidade)).forEach(p => {
                L.marker([p.Latitude, p.Longitude], {
                    icon: L.icon({
                        iconUrl: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzODQgNTEyIiB3aWR0aD0iMzgiIGhlaWdodD0iNTAiPgogIDxwYXRoIGZpbGw9IiNmZjY2MDAiIGQ9Ik0xNzIuMjY4IDUwMS42N0MyNi45NyAyOTEuMDMxIDAgMjY5LjQxMyAwIDE5MiAwIDg1Ljk2MSA4NS45NjEgMCAxOTIgMHMxOTIgODUuOTYxIDE5MiAxOTJjMCA3Ny40MTMtMjYuOTcgOTkuMDMxLTE3Mi4yNjggMzA5LjY3LTkuNTM1IDEzLjc3NC0yOS45MyAxMy43NzMtMzkuNDY0IDB6Ii8+CiAgPGNpcmNsZSBjeD0iMTkyIiBjeT0iMTkyIiByPSI4MCIgZmlsbD0iI2ZmZmZmZiIvPgo8L3N2Zz4=', 
                        iconSize: [28, 28],
                        iconAnchor: [19, 50],
                        popupAnchor: [0, -50]})})
                    .addTo(map)
                    .bindPopup(`<b>${p['Nome Posto']}</b><br>${p.Cidade}/${p.UF}`);
            });
        }

        function limparFiltros() {
            document.getElementById('uf').value = '';
            document.getElementById('cidade').innerHTML = '<option value="">Selecione Cidade</option>';
            map.eachLayer(layer => { if(layer instanceof L.Marker) map.removeLayer(layer); });
        }

        function filtrarPostosProximos() {
            var raio = parseFloat(document.getElementById('raio').value);
            map.eachLayer(layer => { if(layer instanceof L.Marker) map.removeLayer(layer); });
            postos.forEach(p => {
                var dist = calcularDistanciaParaRota(p.Latitude, p.Longitude);
                if(dist <= raio) {
                    L.marker([p.Latitude, p.Longitude], {
                        icon: L.icon({
                            iconUrl: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzODQgNTEyIiB3aWR0aD0iMzgiIGhlaWdodD0iNTAiPgogIDxwYXRoIGZpbGw9IiNmZjY2MDAiIGQ9Ik0xNzIuMjY4IDUwMS42N0MyNi45NyAyOTEuMDMxIDAgMjY5LjQxMyAwIDE5MiAwIDg1Ljk2MSA4NS45NjEgMCAxOTIgMHMxOTIgODUuOTYxIDE5MiAxOTJjMCA3Ny40MTMtMjYuOTcgOTkuMDMxLTE3Mi4yNjggMzA5LjY3LTkuNTM1IDEzLjc3NC0yOS45MyAxMy43NzMtMzkuNDY0IDB6Ii8+CiAgPGNpcmNsZSBjeD0iMTkyIiBjeT0iMTkyIiByPSI4MCIgZmlsbD0iI2ZmZmZmZiIvPgo8L3N2Zz4=', 
                            iconSize: [28, 28],
                            iconAnchor: [19, 50],
                            popupAnchor: [0, -50]})})
                        .addTo(map)
                        .bindPopup(`<b>${p['Nome Posto']}</b><br>${p.Cidade}/${p.UF}`);
                }
            });
        }

        function calcularDistanciaParaRota(lat, lon) {
            var R = 6371; var minDist = Infinity;
            rotaCoords.forEach(coord => {
                var dLat = (coord.lat - lat) * Math.PI / 180;
                var dLon = (coord.lng - lon) * Math.PI / 180;
                var a = Math.sin(dLat/2)**2 + Math.cos(lat*Math.PI/180)*Math.cos(coord.lat*Math.PI/180)*Math.sin(dLon/2)**2;
                var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                var d = R * c;
                if(d < minDist) minDist = d;
            });
            return minDist;
        }
    </script>
